<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>G.S.E.I - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1,h2,h3 { font-family: 'Manrope', sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-4">

  <main class="w-full max-w-md">
    <div class="flex flex-col items-center mb-8">
      <div class="bg-green-700 p-4 rounded-xl mb-3">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
      </div>
      <h1 class="text-xl font-bold text-green-800 tracking-wider">PORTAL INSTITUCIONAL</h1>
    </div>

    <div class="bg-white p-8 rounded-3xl shadow-lg w-full border border-gray-100">
      <h2 class="text-3xl font-bold text-gray-900 mb-2">Acesso ao Sistema</h2>
      <p class="text-gray-600 mb-8">Insira suas credenciais para acessar o painel administrativo.</p>

      <form id="loginForm" class="space-y-6">
        <div id="erroBox" class="hidden bg-red-50 text-red-600 p-3 rounded-xl border border-red-200 text-sm font-medium">
        </div>

        <div>
          <label class="block text-sm font-bold text-green-700 mb-1 tracking-wide">E-MAIL CORPORATIVO</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <input type="email" id="email" value="admin@gsei.gov.br" placeholder="nome@instituicao.gov.br" required
              class="w-full pl-12 pr-4 py-3.5 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-green-200 focus:border-green-400 outline-none transition text-gray-900" />
          </div>
        </div>

        <div>
          <div class="flex justify-between items-center mb-1">
            <label class="block text-sm font-bold text-green-700 tracking-wide">SENHA DE ACESSO</label>
            <a href="#" class="text-sm text-green-600 font-medium hover:text-green-700">Recuperar senha</a>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-6V7a4 4 0 00-8 0v4h8z"/></svg>
            </div>
            <input type="password" id="senha" value="admin123" placeholder="********" required
              class="w-full pl-12 pr-4 py-3.5 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-green-200 focus:border-green-400 outline-none transition text-gray-900" />
          </div>
        </div>

        <div class="flex items-center">
          <input type="checkbox" id="mantem" checked class="w-5 h-5 border-gray-300 rounded text-green-600 focus:ring-green-500" />
          <label for="mantem" class="ml-3 text-gray-700 font-medium">Manter sessão ativa</label>
        </div>

        <button type="submit" id="loginBtn"
          class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-4 rounded-xl transition flex items-center justify-center gap-3 disabled:opacity-60 disabled:cursor-not-allowed">
          ENTRAR NO SISTEMA
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
        </button>
      </form>

      <div class="mt-10 text-center text-sm text-gray-500">
        Suporte técnico? <a href="#" class="text-green-600 font-bold hover:underline">Clique aqui</a>
      </div>
    </div>

    <div class="mt-8 flex gap-6 text-xs text-gray-500 font-medium uppercase tracking-wider">
      <div class="flex items-center gap-2"><div class="w-2 h-2 bg-yellow-400 rounded-full"></div> AMBIENTE SEGURO</div>
      <div class="flex items-center gap-2"><div class="w-2 h-2 bg-green-500 rounded-full"></div> AUDITADO V4.2</div>
    </div>
  </main>

  <script src="../script/login.js"></script>
</body>
</html>
